services:
  dev-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  dev-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev   # usa TU Dockerfile normal del backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
